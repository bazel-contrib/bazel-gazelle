# One-off recovery workflow for the v0.52.0 release.
name: Attest v0.52.0 release archive

on:
  workflow_dispatch:

permissions:
  attestations: write
  contents: write
  id-token: write

jobs:
  attest:
    runs-on: ubuntu-latest
    steps:
      - name: Download existing release archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download v0.52.0 \
            --repo "${{ github.repository }}" \
            --pattern bazel-gazelle-v0.52.0.tar.gz

      - name: Verify existing release archive
        run: |
          echo "564508c5329de6fbffeade560cb5c02a5b9b86f47eb13856f0f00b8548d8e5d6  bazel-gazelle-v0.52.0.tar.gz" \
            | sha256sum --check -

      - name: Attest existing release archive
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: bazel-gazelle-v0.52.0.tar.gz

      - name: Create BCR attestation sidecar
        run: |
          jq --compact-output \
            < "${{ steps.attest.outputs.bundle-path }}" \
            > bazel-gazelle-v0.52.0.tar.gz.intoto.jsonl

      - name: Upload BCR attestation sidecar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload v0.52.0 \
            bazel-gazelle-v0.52.0.tar.gz.intoto.jsonl \
            --repo "${{ github.repository }}"
